name: Docker Image CI

on:
  push:
    branches: [ "main","initproject" ]
  pull_request:
    branches: [ "main","initproject" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/openclaw-observability-platform-backend
            ghcr.io/${{ github.repository_owner }}/openclaw-observability-platform-frontend

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/aishu-opsrobot/openclaw-observability-backend:latest,ghcr.io/${{ github.repository_owner }}/openclaw-observability-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/aishu-opsrobot/openclaw-observability-frontend:latest,ghcr.io/${{ github.repository_owner }}/openclaw-observability-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max