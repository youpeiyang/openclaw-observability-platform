name: openclaw-observability-platform

services:
  # =============================================================================
  # frontend - 静态文件服务
  # =============================================================================
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 3000 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openclaw-net

  # =============================================================================
  # backend 服务 - Node.js 后端
  # =============================================================================
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      - DORIS_HOST=${DORIS_HOST:-doris-fe}
      - DORIS_PORT=${DORIS_PORT:-9030}
      - DORIS_USER=${DORIS_USER:-root}
      - DORIS_PASSWORD=${DORIS_PASSWORD:-}
      - DORIS_DATABASE=${DORIS_DATABASE:-opsRobot}
      - PORT=8787
    depends_on:
      doris-fe:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 8787 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openclaw-net

  # =============================================================================
  # Apache Doris - FE (Frontend) 元数据节点
  # =============================================================================
  doris-fe:
    image: selectdb/doris.fe-ubuntu:3.0.0
    container_name: doris-fe
    hostname: doris-fe
    restart: unless-stopped
    ports:
      - "${DORIS_FE_HTTP_PORT:-8030}:8030"
      - "${DORIS_FE_MYSQL_PORT:-9030}:9030"
    environment:
      - FE_SERVERS=fe1:doris-fe:9010
      - FE_ID=1
      - SKIP_CHECK_ULIMIT=true
    volumes:
      - doris_fe_data:/opt/apache-doris/fe/doris-meta
    networks:
      - openclaw-net
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 9030 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # =============================================================================
  # Apache Doris - BE (Backend) 存储节点
  # =============================================================================
  doris-be:
    image: selectdb/doris.be-ubuntu:3.0.0
    container_name: doris-be
    hostname: doris-be
    restart: unless-stopped
    privileged: true
    environment:
      - FE_SERVERS=fe1:doris-fe:9010
      - BE_ADDR=doris-be:9050
      - SKIP_CHECK_ULIMIT=true
    volumes:
      - doris_be_data:/opt/apache-doris/be/storage
    depends_on:
      - doris-fe
    networks:
      - openclaw-net
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 8040 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

networks:
  openclaw-net:
    driver: bridge
    name: openclaw-observability-platform-network

volumes:
  doris_fe_data:
  doris_be_data:
